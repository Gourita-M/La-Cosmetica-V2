openapi: 3.0.3
info:
  title: La Cosmetica API
  version: 1.0.0
  description: API for authentication, catalog, orders, and administration.
servers:
  - url: http://127.0.0.1:8000/api
paths:
  /login:
    post:
      summary: Login with JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Login success
        "401":
          description: Invalid credentials
  /products:
    get:
      summary: List available products
      responses:
        "200":
          description: Product list
    post:
      summary: Create product (admin only)
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Product created
        "403":
          description: Forbidden
        "422":
          description: Validation error
  /products/{slug}:
    get:
      summary: Get product by slug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product details
        "404":
          description: Product not found
  /orders:
    post:
      summary: Place order by product slugs
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Order created
        "422":
          description: Validation/state error
    get:
      summary: List orders (own for customer; all for staff)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Order list
  /orders/{order}/status:
    put:
      summary: Update order status (employee/admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Status updated
        "403":
          description: Forbidden
  /statistics:
    get:
      summary: Sales and product/category statistics (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Statistics payload
        "403":
          description: Forbidden
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
